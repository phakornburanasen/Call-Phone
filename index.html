<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบ Call มารับโทรศัพท์</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
            background: #f5f7fb;
            color: #2d3436;
            text-align: center;
            padding-bottom: 40px;
        }

        /* ===== HEADER ===== */
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2d3436;
            letter-spacing: 2px;
            margin: 30px 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        h1::before {
            content: '\f095';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 2rem;
            background: linear-gradient(135deg, #00b894, #00cec9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h1::after {
            content: '\f095';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 2rem;
            background: linear-gradient(135deg, #00b894, #00cec9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transform: scaleX(-1);
        }

        /* ===== NAVBAR ===== */
        .navbar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            background: #ffffff;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar a {
            color: #636e72;
            padding: 10px 22px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .navbar a i {
            margin-right: 8px;
            font-size: 18px;
        }
        .navbar a:hover {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.3);
        }

        /* ===== RADIO GROUP ===== */
        .radio-group {
            margin: 25px auto 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .radio-group label {
            position: relative;
            font-size: 15px;
            font-weight: 500;
            color: #2d3436;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            padding: 14px 24px;
            background: #ffffff;
            border-radius: 14px;
            border: 2px solid #e8e8e8;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .radio-group label:hover {
            border-color: #00b894;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.12);
        }
        .radio-group input[type="radio"] {
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #b2bec3;
            outline: none;
            position: relative;
            margin-right: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .radio-group input[type="radio"]:checked {
            border-color: #00b894;
            background: #00b894;
            box-shadow: 0 0 0 4px rgba(0, 184, 148, 0.15);
        }
        .radio-group input[type="radio"]:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
        }
        .radio-group input[type="radio"]:hover {
            border-color: #00b894;
        }

        /* ===== DROPDOWNS ===== */
        .dropdown-group {
            margin: 10px 6px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ffffff;
            padding: 10px 18px;
            border-radius: 12px;
            border: 2px solid #e8e8e8;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }
        .dropdown-group:hover {
            border-color: #00b894;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.1);
        }
        .dropdown-group label {
            font-weight: 500;
            font-size: 14px;
            color: #636e72;
            white-space: nowrap;
        }
        .dropdown-group select {
            padding: 8px 14px;
            font-size: 14px;
            font-family: 'Prompt', sans-serif;
            border-radius: 8px;
            border: 1px solid #dfe6e9;
            background: #f8f9fa;
            color: #2d3436;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 130px;
            outline: none;
        }
        .dropdown-group select:hover {
            border-color: #00b894;
        }
        .dropdown-group select:focus {
            border-color: #00b894;
            box-shadow: 0 0 0 3px rgba(0, 184, 148, 0.12);
        }
        .dropdown-group select option {
            background: #fff;
            color: #2d3436;
        }
        .dropdown-group select:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== CALL BUTTONS ===== */
        .call-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px auto;
            max-width: 900px;
            padding: 0 10px;
        }
        .call-button {
            background: #ffffff;
            color: #2d3436;
            padding: 10px 20px;
            border: 2px solid #e8e8e8;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .call-button:disabled {
            background: #f1f2f6;
            color: #b2bec3;
            border-color: #dfe6e9;
            cursor: not-allowed;
            box-shadow: none;
        }
        .call-button:hover:not(:disabled) {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
            border-color: transparent;
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.3);
        }

        /* ===== PEOPLE GRID ===== */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .person-card {
            border: 2px solid #e8e8e8;
            padding: 18px 12px 16px;
            border-radius: 16px;
            text-align: center;
            background: #ffffff;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .person-card:hover {
            transform: translateY(-6px);
            border-color: #00b894;
            box-shadow: 0 12px 35px rgba(0, 184, 148, 0.15);
        }
        .person-image {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 3px solid #dfe6e9;
            transition: all 0.3s ease;
        }
        .person-card:hover .person-image {
            border-color: #00b894;
            transform: scale(1.08);
        }
        .person-card h4 {
            font-size: 14px;
            font-weight: 500;
            color: #2d3436;
            margin-bottom: 8px;
        }
        .button {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
            padding: 8px 12px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 6px;
            width: 100%;
            font-family: 'Prompt', sans-serif;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.2);
        }
        .button i {
            margin-right: 4px;
        }
        .button:disabled {
            background: #dfe6e9;
            color: #b2bec3;
            cursor: not-allowed;
            box-shadow: none;
        }
        .button:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.35);
        }

        /* ===== SELECTED LIST ===== */
        .selected-list-container {
            position: fixed;
            top: 80px;
            right: 20px;
            background: #ffffff;
            border: 2px solid #e8e8e8;
            padding: 18px;
            border-radius: 16px;
            width: 300px;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            z-index: 50;
        }
        .selected-list-container h3 {
            font-size: 16px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 12px;
            color: #00b894;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        .selected-list-container h3::before {
            content: '\f0ca';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }
        .selected-list-container ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .selected-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #f0f0f0;
            font-size: 14px;
            color: #2d3436;
            transition: all 0.2s ease;
        }
        .selected-list-item:hover {
            background: #f0fdfa;
            border-color: #00b894;
        }
        .remove-button {
            background: #fff5f5;
            color: #e74c3c;
            border: 1px solid #fde8e8;
            border-radius: 8px;
            cursor: pointer;
            padding: 5px 8px;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        .remove-button:hover {
            background: #e74c3c;
            color: #fff;
            border-color: #e74c3c;
        }

        /* ===== SCROLLBAR ===== */
        .selected-list-container::-webkit-scrollbar {
            width: 6px;
        }
        .selected-list-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .selected-list-container::-webkit-scrollbar-thumb {
            background: #dfe6e9;
            border-radius: 3px;
        }
        .selected-list-container::-webkit-scrollbar-thumb:hover {
            background: #b2bec3;
        }

        /* ===== FADE-IN ANIMATION ===== */
        .person-card {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }
        .person-card:nth-child(1) { animation-delay: 0.00s; }
        .person-card:nth-child(2) { animation-delay: 0.04s; }
        .person-card:nth-child(3) { animation-delay: 0.08s; }
        .person-card:nth-child(4) { animation-delay: 0.12s; }
        .person-card:nth-child(5) { animation-delay: 0.16s; }
        .person-card:nth-child(6) { animation-delay: 0.20s; }
        .person-card:nth-child(7) { animation-delay: 0.24s; }
        .person-card:nth-child(8) { animation-delay: 0.28s; }
        .person-card:nth-child(9) { animation-delay: 0.32s; }
        .person-card:nth-child(10) { animation-delay: 0.36s; }
        .person-card:nth-child(11) { animation-delay: 0.40s; }
        .person-card:nth-child(12) { animation-delay: 0.44s; }
        .person-card:nth-child(13) { animation-delay: 0.48s; }
        .person-card:nth-child(14) { animation-delay: 0.52s; }
        .person-card:nth-child(15) { animation-delay: 0.56s; }
        .person-card:nth-child(16) { animation-delay: 0.60s; }
        .person-card:nth-child(17) { animation-delay: 0.64s; }
        .person-card:nth-child(18) { animation-delay: 0.68s; }
        .person-card:nth-child(19) { animation-delay: 0.72s; }
        .person-card:nth-child(20) { animation-delay: 0.76s; }
        .person-card:nth-child(21) { animation-delay: 0.80s; }
        .person-card:nth-child(22) { animation-delay: 0.84s; }
        .person-card:nth-child(23) { animation-delay: 0.88s; }
        .person-card:nth-child(24) { animation-delay: 0.92s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                margin: 20px 0 10px;
            }
            h1::before, h1::after {
                font-size: 1.4rem;
            }
            .navbar {
                gap: 4px;
                padding: 10px 10px;
            }
            .navbar a {
                font-size: 14px;
                padding: 8px 14px;
            }
            .container {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 12px;
                padding: 0 12px;
            }
            .person-card {
                padding: 12px 8px;
            }
            .person-image {
                width: 56px;
                height: 56px;
            }
            .person-card h4 {
                font-size: 12px;
            }
            .selected-list-container {
                position: static;
                width: 90%;
                margin: 20px auto;
                max-height: 300px;
            }
            .dropdown-group {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                margin: 6px 4px;
                padding: 8px 12px;
            }
            .dropdown-group select {
                min-width: 100px;
                font-size: 13px;
            }
            .call-buttons {
                gap: 8px;
            }
            .call-button {
                font-size: 12px;
                padding: 8px 14px;
            }
            .radio-group label {
                font-size: 14px;
                padding: 10px 16px;
            }
        }
    </style>
</head>

        function playSelectedSounds() {
            if (!selectedSounds.length) return;

            const playSequence = [
                { name: "Start", soundFile: "Call.wav" },
                ...selectedSounds,
                ...selectedSounds,
                { name: "thanks", soundFile: "ขอบคุณค่ะ.wav" },
                { name: "End", soundFile: "Call.wav" }
            ];

            let playIndex = 0;
            let playCount = 0;

            function playNext() {
                if (playIndex < playSequence.length) {
                    const sound = new Audio(`sound/${playSequence[playIndex].soundFile}`);
                    sound.play();
                    sound.onended = () => {
                        playIndex++;
                        playNext();
                    };
                } else {
                    playCount++;
                    if (playCount < 1) {
                        playIndex = 1;
                        playNext();
                    } else {
                        reloadPage();
                    }
                }
            }

            const startSound = new Audio(`sound/${playSequence[0].soundFile}`);
            startSound.play();
            startSound.onended = () => {
                playIndex = 1;
                playNext();
            };
        }
